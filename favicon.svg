<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#fff" rx="2"/>

  <!-- Comically huge SE band -->
  <polygon points="0,12 24,0 32,0 32,22 8,32 0,32" fill="#3498db" fill-opacity="0.22"/>
  <line x1="0" y1="12" x2="24" y2="0" stroke="#3498db" stroke-width="0.8" stroke-dasharray="2,1.5" opacity="0.7"/>
  <line x1="8" y1="32" x2="32" y2="22" stroke="#3498db" stroke-width="0.8" stroke-dasharray="2,1.5" opacity="0.7"/>

  <!-- Regression line -->
  <line x1="0" y1="22" x2="32" y2="12" stroke="#1a252f" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Scatter dots -->
  <circle cx="4"  cy="25" r="1.3" fill="#c0392b"/>
  <circle cx="9"  cy="19" r="1.3" fill="#c0392b"/>
  <circle cx="14" cy="9"  r="1.3" fill="#c0392b"/>
  <circle cx="19" cy="20" r="1.3" fill="#c0392b"/>
  <circle cx="24" cy="7"  r="1.3" fill="#c0392b"/>
  <circle cx="28" cy="16" r="1.3" fill="#c0392b"/>
</svg>
